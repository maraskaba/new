<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Círculos Concéntricos</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #05040a;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  .hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-family: system-ui, sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">mové el mouse · tocá la pantalla</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  cx = W / 2;
  cy = H / 2;
}
window.addEventListener('resize', resize);
resize();

// puntero para interactuar (offset sutil del centro / intensidad)
let pointer = { x: 0, y: 0, active: false };
function setPointer(px, py) {
  pointer.x = (px - window.innerWidth / 2) / window.innerWidth;
  pointer.y = (py - window.innerHeight / 2) / window.innerHeight;
}
window.addEventListener('mousemove', e => setPointer(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  if (e.touches[0]) setPointer(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
window.addEventListener('mousedown', () => pointer.active = true);
window.addEventListener('mouseup', () => pointer.active = false);
window.addEventListener('touchstart', () => pointer.active = true, { passive: true });
window.addEventListener('touchend', () => pointer.active = false);

const RINGS = 22;
const POINTS = 140;

// cada anillo tiene sus propias frecuencias/fases para que la deformación
// nunca se repita igual y se vea orgánica y rápida
const ringConfigs = [];
for (let i = 0; i < RINGS; i++) {
  ringConfigs.push({
    freqA: 3 + Math.floor(Math.random() * 5),
    freqB: 5 + Math.floor(Math.random() * 7),
    speedA: 1.4 + Math.random() * 1.8,
    speedB: 0.8 + Math.random() * 1.4,
    phase: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.9,
    ampBase: 0.12 + Math.random() * 0.18,
    hueOffset: Math.random() * 40 - 20,
  });
}

let t = 0;
let lastTime = performance.now();

function draw(now) {
  const dt = Math.min(48, now - lastTime) / 1000;
  lastTime = now;
  // velocidad global alta para que la forma cambie "rápido"
  t += dt * 2.6;

  ctx.clearRect(0, 0, W, H);

  // fondo con leve vignette
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0b0a16');
  bg.addColorStop(1, '#020103');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  const minDim = Math.min(W, H);
  const maxBaseRadius = minDim * 0.46;
  const intensity = pointer.active ? 1.8 : 1;

  ctx.globalCompositeOperation = 'lighter';

  for (let r = RINGS; r >= 1; r--) {
    const cfg = ringConfigs[r - 1];
    const baseRadius = (r / RINGS) * maxBaseRadius;
    const amp = baseRadius * cfg.ampBase * intensity;
    const rot = t * cfg.rotSpeed;

    const offX = pointer.x * minDim * 0.06 * (r / RINGS);
    const offY = pointer.y * minDim * 0.06 * (r / RINGS);

    ctx.beginPath();
    for (let p = 0; p <= POINTS; p++) {
      const a = (p / POINTS) * Math.PI * 2;
      const wobble =
        Math.sin(a * cfg.freqA + t * cfg.speedA + cfg.phase) * amp +
        Math.cos(a * cfg.freqB - t * cfg.speedB + cfg.phase) * amp * 0.6;
      const radius = baseRadius + wobble;
      const ang = a + rot;
      const x = cx + offX + Math.cos(ang) * radius;
      const y = cy + offY + Math.sin(ang) * radius;
      if (p === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();

    const hue = (t * 26 + r * (360 / RINGS) + cfg.hueOffset) % 360;
    const lightness = 50 + 10 * Math.sin(t * 1.3 + r);
    ctx.strokeStyle = `hsla(${hue}, 95%, ${lightness}%, 0.85)`;
    ctx.lineWidth = Math.max(1.2, minDim * 0.0016);
    ctx.shadowColor = `hsla(${hue}, 100%, 60%, 0.9)`;
    ctx.shadowBlur = minDim * 0.012;
    ctx.stroke();
  }

  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
