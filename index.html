<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Maraskaba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@700&family=Playfair+Display:wght@900&family=Archivo+Black&family=Courier+Prime:wght@700&family=Righteous&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    transition: background-color 1.2s ease;
  }

  .shapes-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .shape {
    position: absolute;
    opacity: 0.28;
    transition: background-color 1.2s ease;
    animation-name: pulseSize;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
  }

  .shape.circle   { border-radius: 50%; }
  .shape.square   { border-radius: 10%; }
  .shape.triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  .shape.hexagon  { clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%); }

  @keyframes pulseSize {
    0%, 100% { transform: scale(var(--min-scale)); }
    50%      { transform: scale(var(--max-scale)); }
  }

  .stage {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #title {
    font-size: 11vw;
    letter-spacing: 0.04em;
    margin: 0;
    text-align: center;
    transition: opacity 0.6s ease, color 1s ease;
  }
</style>
</head>
<body>

<div class="shapes-bg" id="shapesBg"></div>

<div class="stage">
  <h1 id="title">MARASKABA</h1>
</div>

<script>
  const HOLD_MS = 10000;

  const themes = [
    { font: "'Bebas Neue', sans-serif",     bg: "#0d0d0d", color: "#ffffff", c1: "#ffffff", c2: "#8a8a8a" },
    { font: "'Playfair Display', serif",    bg: "#f7ecd0", color: "#1c1c1c", c1: "#1c1c1c", c2: "#d4af37" },
    { font: "'Space Grotesk', sans-serif",  bg: "#1a1a2e", color: "#f9d923", c1: "#f9d923", c2: "#4d4d8f" },
    { font: "'Archivo Black', sans-serif",  bg: "#efe9da", color: "#d7263d", c1: "#d7263d", c2: "#3a3a3a" },
    { font: "'Courier Prime', monospace",   bg: "#101820", color: "#00e5ff", c1: "#00e5ff", c2: "#0a6b7a" },
    { font: "'Righteous', cursive",         bg: "#ffe9c7", color: "#6a0572", c1: "#6a0572", c2: "#f7a400" },
    { font: "'Space Grotesk', sans-serif",  bg: "#0b132b", color: "#f77f00", c1: "#f77f00", c2: "#1c2e4a" },
    { font: "'Space Mono', monospace",      bg: "#000000", color: "#ffb400", c1: "#ffb400", c2: "#3a3a3a" },
  ];

  const titleEl = document.getElementById("title");
  const shapesBg = document.getElementById("shapesBg");
  let idx = 0;

  const SHAPE_TYPES = ["circle", "square", "triangle", "hexagon"];
  const SHAPE_COUNT = 18;
  const shapeEls = [];

  function buildShapes() {
    for (let i = 0; i < SHAPE_COUNT; i++) {
      const el = document.createElement("div");
      const type = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
      const size = Math.round(40 + Math.random() * 160);
      const minScale = (0.5 + Math.random() * 0.3).toFixed(2);
      const maxScale = (1.1 + Math.random() * 0.5).toFixed(2);
      const duration = (6 + Math.random() * 10).toFixed(1);
      const delay = (Math.random() * 8).toFixed(1);
      const colorSlot = i % 2 === 0 ? "c1" : "c2";

      el.className = `shape ${type}`;
      el.dataset.colorSlot = colorSlot;
      el.style.left = Math.random() * 100 + "%";
      el.style.top = Math.random() * 100 + "%";
      el.style.width = size + "px";
      el.style.height = size + "px";
      el.style.setProperty("--min-scale", minScale);
      el.style.setProperty("--max-scale", maxScale);
      el.style.animationDuration = duration + "s";
      el.style.animationDelay = delay + "s";

      shapesBg.appendChild(el);
      shapeEls.push(el);
    }
  }

  function applyShapeColors(theme) {
    shapeEls.forEach((el) => {
      el.style.backgroundColor = theme[el.dataset.colorSlot];
    });
  }

  function applyTheme(theme) {
    document.body.style.backgroundColor = theme.bg;
    applyShapeColors(theme);
    titleEl.style.opacity = "0";
    setTimeout(() => {
      titleEl.style.fontFamily = theme.font;
      titleEl.style.color = theme.color;
      titleEl.style.opacity = "1";
    }, 600);
  }

  buildShapes();
  applyTheme(themes[0]);

  setInterval(() => {
    idx = (idx + 1) % themes.length;
    applyTheme(themes[idx]);
  }, HOLD_MS);
</script>
</body>
</html>
